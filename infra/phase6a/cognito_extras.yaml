AWSTemplateFormatVersion: "2010-09-09"
Description: |
  AIOps Multi-Agent Demo вҖ” Phase 6a Cognito extras (Client A + Client B + OperatorUser
  + мғҲ ResourceServer 'agent-invoke').

  Phase 2 cognito stack мҷ„м „ лҜён„°м№ҳ (preservation rule). UserPoolId лҠ” Parameter лЎң
  мЈјмһ… (Phase 2 cognito.yaml мқҙ Export м•Ҳ н•Ё вҶ’ ImportValue мӮ¬мҡ© л¶Ҳк°Җ, deploy.sh к°Җ
  describe-stacks лЎң query нӣ„ Parameter м „лӢ¬).

  reference:
    - docs/design/phase6a.md В§6 (Cognito Client A/B мғҒм„ё)
    - 02-use-cases/A2A-multi-agent-incident-response/cloudformation/cognito.yaml
      (multi-Client + ResourceServer + scope нҢЁн„ҙ)

Parameters:
  DemoUser:
    Type: String
    Description: мӣҢнҒ¬мғө мІӯмӨ‘ prefix (Phase 0/2 мҷҖ лҸҷмқј к°’)
    AllowedPattern: "^[a-zA-Z0-9-]{1,16}$"

  UserPoolId:
    Type: String
    Description: Phase 2 cognito stack мқҳ UserPoolId (deploy.sh к°Җ describe-stacks лЎң query)

  OperatorUserEmail:
    Type: String
    Description: Operator мӮ¬мҡ©мһҗ мқҙл©”мқј (workshop мІӯмӨ‘ ліёмқё мқҙл©”мқј к¶ҢмһҘ; м•ҢлҰј л°ңмҶЎ м•Ҳ н•Ё)
    AllowedPattern: "^[^@]+@[^@]+\\.[^@]+$"

Resources:
  # === мӢ к·ң ResourceServer 'agent-invoke' ===========================
  # Phase 2 мқҳ 'aiops-demo-${user}-resource-server/invoke' мҷҖ л¶„лҰ¬. мқҳлҜёлЎ :
  # AgentCore Authorizer лҠ” scope кІҖмҰқ м•Ҳ н•Ё (allowedClients л§Ң) вҖ” ліё scope лҠ”
  # Cognito мёЎ нҶ нҒ° л°ңкёү м •мұ… л¶„лҰ¬ + к°җмӮ¬ к°ҖмӢңм„ұ мң„н•ң hygiene (phase6a.md В§6-2).
  AgentInvokeResourceServer:
    Type: AWS::Cognito::UserPoolResourceServer
    Properties:
      UserPoolId: !Ref UserPoolId
      Identifier: !Sub "aiops-demo-${DemoUser}-agent-invoke"
      Name: "Agent A2A Invoke"
      Scopes:
        - ScopeName: invoke
          ScopeDescription: A2A invoke between agents

  # === Client A вҖ” Operator user JWT (Supervisor inbound) ==============
  # USER_PASSWORD_AUTH grant вҖ” Operator CLI к°Җ мӮ¬мҡ©мһҗлӘ…/л№„л°ҖлІҲнҳёлЎң м§Ғм ‘ мқёмҰқ.
  # PKCE (browser flow) нҡҢн”ј вҖ” CLI м—җм„ң 1мӨ„ prompt лЎң м¶©л¶„.
  # GenerateSecret: false вҖ” мӣҢнҒ¬мғө лӢЁмҲңм„ұ (SECRET_HASH кі„мӮ° л¶Ҳн•„мҡ”).
  UserPoolClientA:
    Type: AWS::Cognito::UserPoolClient
    DependsOn: AgentInvokeResourceServer
    Properties:
      ClientName: !Sub "aiops-demo-${DemoUser}-client-a"
      UserPoolId: !Ref UserPoolId
      GenerateSecret: false
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - openid
        - email
        - profile
        - !Sub "aiops-demo-${DemoUser}-agent-invoke/invoke"
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      SupportedIdentityProviders:
        - COGNITO
      CallbackURLs:
        - http://localhost:8501/
        - http://localhost:5173/
      AccessTokenValidity: 60
      IdTokenValidity: 60
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: minutes
        IdToken: minutes
        RefreshToken: days
      EnableTokenRevocation: true
      PreventUserExistenceErrors: ENABLED

  # === Client B вҖ” Supervisor M2M (sub-agent A2A нҳём¶ңмҡ©) =================
  # client_credentials grant вҖ” Supervisor Runtime мқҳ OAuth provider к°Җ ліё client мқҳ
  # ID/Secret мңјлЎң token л°ңкёү. sub-agent Runtime мқҳ customJWTAuthorizer.allowedClients
  # к°Җ Client B мқҳ ID лЎң кІҖмҰқ вҖ” token мқҳ aud claim мқҙ л§Өм№ӯ.
  UserPoolClientB:
    Type: AWS::Cognito::UserPoolClient
    DependsOn: AgentInvokeResourceServer
    Properties:
      ClientName: !Sub "aiops-demo-${DemoUser}-client-b"
      UserPoolId: !Ref UserPoolId
      GenerateSecret: true
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthFlows:
        - client_credentials
      AllowedOAuthScopes:
        - !Sub "aiops-demo-${DemoUser}-agent-invoke/invoke"
      ExplicitAuthFlows:
        - ALLOW_REFRESH_TOKEN_AUTH
      SupportedIdentityProviders:
        - COGNITO
      AccessTokenValidity: 1
      TokenValidityUnits:
        AccessToken: hours
      PreventUserExistenceErrors: ENABLED

  # === Operator user вҖ” Client A к°Җ мқёмҰқн•  мӮ¬мҡ©мһҗ ======================
  # MessageAction: SUPPRESS + DesiredDeliveryMediums: [] вҖ” мқҙл©”мқј л°ңмҶЎ м•Ҳ н•Ё.
  # л№„л°ҖлІҲнҳёлҠ” deploy.sh м—җм„ң boto3 admin-set-user-password лЎң лі„лҸ„ м„Өм •
  # (CFN м—җ л№„л°ҖлІҲнҳё hardcode нҡҢн”ј).
  OperatorUser:
    Type: AWS::Cognito::UserPoolUser
    Properties:
      UserPoolId: !Ref UserPoolId
      Username: !Sub "operator-${DemoUser}"
      MessageAction: SUPPRESS
      DesiredDeliveryMediums: []
      UserAttributes:
        - Name: email
          Value: !Ref OperatorUserEmail
        - Name: email_verified
          Value: "true"

Outputs:
  ClientAId:
    Description: Cognito Client A ID (operator USER_PASSWORD_AUTH inbound to Supervisor)
    Value: !Ref UserPoolClientA

  ClientBId:
    Description: Cognito Client B ID (Supervisor M2M for A2A outbound to sub-agents)
    Value: !Ref UserPoolClientB

  AgentInvokeResourceServerId:
    Description: мӢ к·ң ResourceServer identifier (лі„ namespace from Phase 2 'invoke')
    Value: !Ref AgentInvokeResourceServer

  AgentInvokeScope:
    Description: A2A scope м „мІҙ мӢқлі„мһҗ
    Value: !Sub "aiops-demo-${DemoUser}-agent-invoke/invoke"

  OperatorUserName:
    Description: Operator user мқҳ username (Operator CLI к°Җ USERNAME мңјлЎң мӮ¬мҡ©)
    Value: !Sub "operator-${DemoUser}"
