name: s3-4xx-public-bucket
description: Public bucket 4XX > 20 / 5m
owner: web
service: assets
metric:
  namespace: AWS/S3
  name: 4xxErrors
  statistic: Sum
  dimensions:
  - Name: BucketName
    Value: public-assets
  - Name: FilterId
    Value: EntireBucket
evaluation:
  period_seconds: 300
  evaluation_periods: 1
  threshold: 20.0
  comparison_operator: GreaterThanThreshold
  treat_missing_data: missing
severity: warning
actions:
  ok: []
  alarm:
  - sns:topic:cloud-ops-alerts
  insufficient_data: []
