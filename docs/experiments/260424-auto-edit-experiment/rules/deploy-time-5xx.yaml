name: deploy-time-5xx
description: ALB 5XX > 3 per minute (deploy sensitivity)
owner: platform
service: api
metric:
  namespace: AWS/ApplicationELB
  name: HTTPCode_ELB_5XX_Count
  statistic: Sum
  dimensions:
  - Name: LoadBalancer
    Value: app/api-alb/def456
evaluation:
  period_seconds: 60
  evaluation_periods: 1
  threshold: 3.0
  comparison_operator: GreaterThanThreshold
  treat_missing_data: missing
severity: warning
actions:
  ok: []
  alarm:
  - sns:topic:cloud-ops-alerts
  insufficient_data: []
