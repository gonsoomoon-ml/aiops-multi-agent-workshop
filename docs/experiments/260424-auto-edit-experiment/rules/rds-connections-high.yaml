name: rds-connections-high
description: RDS connections > 80
owner: data
service: rds-prod
metric:
  namespace: AWS/RDS
  name: DatabaseConnections
  statistic: Average
  dimensions:
  - Name: DBInstanceIdentifier
    Value: prod-primary
evaluation:
  period_seconds: 300
  evaluation_periods: 1
  threshold: 80.0
  comparison_operator: GreaterThanThreshold
  treat_missing_data: missing
severity: warning
actions:
  ok: []
  alarm:
  - sns:topic:cloud-ops-alerts
  insufficient_data: []
