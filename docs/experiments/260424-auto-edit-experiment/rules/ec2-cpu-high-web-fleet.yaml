name: ec2-cpu-high-web-fleet
description: Web fleet CPU > 70% for 5 minutes
owner: platform
service: web
metric:
  namespace: AWS/EC2
  name: CPUUtilization
  statistic: Average
  dimensions:
  - Name: AutoScalingGroupName
    Value: web-asg
evaluation:
  period_seconds: 300
  evaluation_periods: 1
  threshold: 70.0
  comparison_operator: GreaterThanThreshold
  treat_missing_data: missing
severity: warning
actions:
  ok: []
  alarm:
  - sns:topic:cloud-ops-alerts
  insufficient_data: []
