name: old-ec2-status-check
description: Deprecated EC2 status check failure
owner: unknown
service: legacy-ec2
metric:
  namespace: AWS/EC2
  name: StatusCheckFailed
  statistic: Sum
  dimensions:
  - Name: InstanceId
    Value: i-0deadbeef0000001
evaluation:
  period_seconds: 60
  evaluation_periods: 1
  threshold: 0.0
  comparison_operator: GreaterThanThreshold
  treat_missing_data: missing
severity: warning
actions:
  ok: []
  alarm:
  - sns:topic:cloud-ops-alerts
  insufficient_data: []
