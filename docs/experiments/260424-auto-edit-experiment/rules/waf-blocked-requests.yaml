name: waf-blocked-requests
description: WAF blocked > 0
owner: security
service: security
metric:
  namespace: AWS/WAFV2
  name: BlockedRequests
  statistic: Sum
  dimensions:
  - Name: WebACL
    Value: prod-acl
  - Name: Region
    Value: us-west-2
evaluation:
  period_seconds: 60
  evaluation_periods: 1
  threshold: 0.0
  comparison_operator: GreaterThanThreshold
  treat_missing_data: missing
severity: warning
actions:
  ok: []
  alarm:
  - sns:topic:cloud-ops-alerts
  insufficient_data: []
