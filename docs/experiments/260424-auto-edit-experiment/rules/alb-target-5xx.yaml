name: alb-target-5xx
description: ALB target 5XX > 5 per 5 minutes
owner: platform
service: web
metric:
  namespace: AWS/ApplicationELB
  name: HTTPCode_Target_5XX_Count
  statistic: Sum
  dimensions:
  - Name: LoadBalancer
    Value: app/web-alb/abc123
evaluation:
  period_seconds: 300
  evaluation_periods: 1
  threshold: 5.0
  comparison_operator: GreaterThanThreshold
  treat_missing_data: missing
severity: warning
actions:
  ok: []
  alarm:
  - sns:topic:cloud-ops-alerts
  insufficient_data: []
