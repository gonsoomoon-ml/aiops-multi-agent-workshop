name: nightly-batch-cpu-spike
description: Batch fleet CPU > 80% for 5 minutes
owner: data
service: batch
metric:
  namespace: AWS/EC2
  name: CPUUtilization
  statistic: Average
  dimensions:
  - Name: AutoScalingGroupName
    Value: batch-asg
evaluation:
  period_seconds: 300
  evaluation_periods: 1
  threshold: 80.0
  comparison_operator: GreaterThanThreshold
  treat_missing_data: missing
severity: warning
actions:
  ok: []
  alarm:
  - sns:topic:cloud-ops-alerts
  insufficient_data: []
